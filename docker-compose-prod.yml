# PostgreSQL + App 운영환경 구성
# 사용법: docker compose -f docker-compose-prod.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: kanban-postgres
    environment:
      POSTGRES_DB: kanban
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD env var must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/world-goes-to-hell/ysk-kanban:latest
    container_name: kanban-board
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/app/uploads
    environment:
      - TZ=Asia/Seoul
      - JAVA_OPTS=-Duser.timezone=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://postgres:5432/kanban
      - DB_USERNAME=kanban
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD env var must be set}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  app_uploads:
