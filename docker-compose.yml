services:
  app:
    image: ghcr.io/world-goes-to-hell/ysk-kanban:latest
    container_name: kanban-board
    ports:
      - "8080:8080"
    volumes:
      - /home/junu/docker_data/kanbanboard/data:/app/data
      - /home/junu/docker_data/kanbanboard/uploads:/app/uploads
    environment:
      - TZ=Asia/Seoul
      - JAVA_OPTS=-Duser.timezone=Asia/Seoul
    restart: unless-stopped
